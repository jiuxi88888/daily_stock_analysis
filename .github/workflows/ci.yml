# .github/workflows/ci.yml
name: CI - 代码质量检查

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  syntax-check:
    name: ✅ 语法检查
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 🔍 Python 语法检查
        run: |
          echo "🔍 检查所有 Python 文件语法..."
          find . -name "*.py" -not -path "./.venv/*" -not -path "./venv/*" -exec python -m py_compile {} \;
          echo "✅ 所有 Python 文件语法正确"
