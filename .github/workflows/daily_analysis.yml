name: 每日股票分析

# 解决Node.js版本警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # 定时触发 - 每天北京时间 18:00 (UTC 10:00)
  schedule:
    - cron: '0 10 * * 1-5'  # 周一到周五，北京时间18:00
  
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'stocks-only'
        type: choice
        options:
          - full          # 完整分析
          - market-only   # 仅大盘复盘
          - stocks-only   # 仅股票分析

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐍 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 安装依赖
        run: |
          echo "开始安装依赖..."
          pip install --upgrade pip
          
          if [ -f "requirements.txt" ]; then
            echo "从requirements.txt安装..."
            pip install -r requirements.txt
          else
